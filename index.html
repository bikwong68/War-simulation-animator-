<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Simulation Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; overflow: hidden; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, memo } = React;

        // --- FIREBASE CDN IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- SECURITY: SHA-256 PASSWORD HASHING ---
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // --- NETWORK: RESILIENT RETRY LOGIC ---
        const runWithRetry = async (operation, maxRetries = 5) => {
            let currentDelay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    if (!auth.currentUser) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                    return await operation();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, currentDelay));
                    currentDelay *= 2;
                }
            }
        };

        // --- COMPONENT: SECURE INPUT ---
        const FormInput = memo(({ label, iconName, type, value, onChange, placeholder, status, statusMessage }) => {
            const Icon = lucide[iconName] || lucide.User;
            return (
                <div className="space-y-1 w-full text-left">
                    <div className="flex justify-between items-end">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{label}</label>
                        {statusMessage && (
                            <span className={`text-[10px] font-bold uppercase tracking-wider ${status === 'error' ? 'text-red-400' : 'text-emerald-400'}`}>
                                {statusMessage}
                            </span>
                        )}
                    </div>
                    <div className="relative">
                        <div className="absolute left-3 top-3.5 w-4 h-4 text-slate-600"><Icon size={18} /></div>
                        <input 
                            type={type} 
                            required
                            value={value}
                            onChange={(e) => onChange(e.target.value)}
                            className={`w-full bg-black border rounded-lg py-3 pl-10 pr-4 text-white text-sm focus:outline-none transition-colors
                                ${status === 'error' ? 'border-red-500/50 focus:border-red-500' : 
                                  status === 'success' ? 'border-emerald-500/50 focus:border-emerald-500' : 
                                  'border-slate-800 focus:border-blue-500'}`} 
                            placeholder={placeholder}
                        />
                    </div>
                </div>
            );
        });

        function App() {
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [view, setView] = useState('landing');
            const [username, setUsername] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [errorMessage, setErrorMessage] = useState('');
            const [userStatus, setUserStatus] = useState('idle');
            const [userStatusMsg, setUserStatusMsg] = useState('');

            // LIVE VALIDATION ENGINE
            useEffect(() => {
                if (view !== 'signup' || username.length === 0) return;
                const timeoutId = setTimeout(async () => {
                    if (!/^[a-zA-Z0-9]+$/.test(username)) {
                        setUserStatus('error'); setUserStatusMsg('Alphanumeric only'); return;
                    }
                    if (username.length < 8) {
                        setUserStatus('error'); setUserStatusMsg('Too short (8+)'); return;
                    }
                    setUserStatus('loading');
                    try {
                        const snap = await runWithRetry(() => getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'accounts', username.toLowerCase())));
                        if (snap.exists()) {
                            setUserStatus('error'); setUserStatusMsg('ID taken');
                        } else {
                            setUserStatus('success'); setUserStatusMsg('Available');
                        }
                    } catch (e) { setUserStatus('idle'); }
                }, 600);
                return () => clearTimeout(timeoutId);
            }, [username, view]);

            // BOOT SEQUENCE
            useEffect(() => {
                const init = async () => {
                    try {
                        await setPersistence(auth, browserLocalPersistence);
                        onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', u.uid));
                                if (snap.exists() && snap.data().username) {
                                    setUsername(snap.data().username);
                                    setView('authenticated');
                                }
                            }
                            setLoading(false);
                        });
                    } catch(e) { setLoading(false); }
                };
                init();
            }, []);

            const handleAuth = async (e, mode) => {
                e.preventDefault();
                if (isSubmitting) return;
                setIsSubmitting(true);
                setErrorMessage('');

                try {
                    const safeU = username.toLowerCase();
                    const hashed = await hashPassword(password);
                    const accDoc = doc(db, 'artifacts', appId, 'public', 'data', 'accounts', safeU);
                    const snap = await runWithRetry(() => getDoc(accDoc));

                    if (mode === 'signup') {
                        if (snap.exists()) throw new Error("Commander ID already registered.");
                        await setDoc(accDoc, { email: email.toLowerCase(), password: hashed, originalCase: username });
                    } else {
                        if (!snap.exists() || snap.data().password !== hashed) throw new Error("Invalid Commander credentials.");
                    }

                    if (auth.currentUser) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', auth.currentUser.uid), { username: safeU });
                    }
                    setView('authenticated');
                } catch (err) { setErrorMessage(err.message); }
                setIsSubmitting(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-blue-500 font-bold tracking-widest animate-pulse">BOOTING...</div>;

            if (view === 'authenticated') return (
                <div className="h-screen flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-700">
                    <div className="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mb-6 border border-emerald-500/30">
                        <lucide.ShieldCheck className="text-emerald-500" size={40} />
                    </div>
                    <h1 className="text-2xl font-bold uppercase tracking-[0.2em] text-white">Access Granted</h1>
                    <p className="text-slate-500 text-sm mt-3 font-mono">ID: @{username}</p>
                    <button onClick={() => { auth.signOut(); setView('landing'); }} className="mt-12 text-[10px] uppercase font-bold text-slate-600 hover:text-red-500 transition-colors tracking-widest">Disengage Link</button>
                </div>
            );

            if (view === 'landing') return (
                <div className="h-screen flex flex-col items-center justify-center p-6 space-y-6">
                    <div className="p-5 bg-blue-500/10 rounded-full border border-blue-500/20">
                        <lucide.User className="text-blue-500" size={48} />
                    </div>
                    <h1 className="text-3xl font-bold uppercase tracking-tighter text-white">War Simulation</h1>
                    <div className="w-full max-w-xs space-y-3 pt-4">
                        <button onClick={() => setView('signup')} className="w-full py-4 bg-blue-600 font-bold rounded-lg hover:bg-blue-500 transition-all shadow-lg shadow-blue-900/20">Enroll Commander</button>
                        <button onClick={() => setView('login')} className="w-full py-4 bg-slate-900 border border-slate-800 font-bold rounded-lg hover:bg-slate-800 transition-all">Existing Access</button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 via-black to-black">
                    <div className="w-full max-w-sm bg-slate-900/40 p-8 rounded-2xl border border-slate-800 backdrop-blur-md">
                        <h2 className="text-xl font-bold mb-8 uppercase tracking-widest text-white">{view === 'login' ? 'Auth' : 'Enroll'}</h2>
                        {errorMessage && <p className="mb-6 text-red-500 text-[11px] uppercase font-bold bg-red-500/10 p-3 rounded border border-red-500/20">{errorMessage}</p>}
                        <form onSubmit={(e) => handleAuth(e, view)} className="space-y-5">
                            <FormInput label="Commander ID" iconName="User" type="text" value={username} onChange={setUsername} status={view === 'signup' ? userStatus : 'idle'} statusMessage={view === 'signup' ? userStatusMsg : ''} placeholder="8+ Alpha-numeric" />
                            {view === 'signup' && <FormInput label="Secure Email" iconName="Mail" type="email" value={email} onChange={setEmail} placeholder="id@base-hq.com" />}
                            <FormInput label="Access Code" iconName="Lock" type="password" value={password} onChange={setPassword} placeholder="••••••••" />
                            <button type="submit" disabled={isSubmitting || (view === 'signup' && userStatus === 'error')} className="w-full py-4 bg-blue-600 font-bold rounded-lg mt-6 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                                {isSubmitting ? 'PROCESSING...' : 'CONFIRM LINK'}
                            </button>
                            <button type="button" onClick={() => setView('landing')} className="w-full text-slate-600 text-[10px] mt-4 uppercase font-bold tracking-widest hover:text-white transition-colors">Abort Access</button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
